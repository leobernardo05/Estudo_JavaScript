<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo JS</title>
    <!--Babel utilizado para converter ES6 para ES5 em browser antigos-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        // notação de classe (ES6)
        class Produto { 
            constructor (descricao, preco){
                this.descricao = descricao
                this.preco = preco
            }
            verDescricao () {
                console.log(`${this.descricao} por apenas ${this.preco}`)
            } 
        }
        let produto = new Produto ('notebook acer aspire 5', 2500)
        produto.verDescricao()

        //-------------- objeto literal
        let produtoLiteral = {
            descricao: 'Geladeira', 
            preco: 1800,
            verDescricao: function(){
                console.log(`${this.descricao} por apenas ${this.preco}`)
            }
        }
        produtoLiteral.verDescricao()
        // --------------------------------------------
        /*
        formulario -> servidor
            recupera dados e monta um objeto literal
                obj literal -> JSON -> HTTP -> Server -> Armazena
        */
    </script>
</head>
<body>

</body>
</html>
