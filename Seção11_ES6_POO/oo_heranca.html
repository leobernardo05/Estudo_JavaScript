<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo JS</title>
    <!--Babel utilizado para converter ES6 para ES5 em browser antigos-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        // objeto cachorro 
        class Cachorro {
            // inicializando atributos cachorro
            constructor (){
                this.cor = 'black'
                this.tamanho = 30
                this.orelhas = 'big and fallen'
            }
            correr (){
                console.log('Run')
            }
            dormir (){
                console.log ('Sleep')
            }
            rosnar () {
                console.log('Growl')
            }
        }

        // objeto passaro
        class Passaro {
            // inicializando atributos
            constructor (){
                this.cor = 'Blue'
                this.tamanho = 25
                this.bico = 'Small'
            }
            voar () {
                console.log('to fly')
            }
            dormir (){
                console.log('sleep')
            }
        }

        let cachorro = new Cachorro ()
        let passaro = new Passaro ()

        // console.log(cachorro)
        // console.log(passaro)


        // ------------herança --------
        // superclasse
        class Animal {
            constructor (cor, tamanho, peso){
                this.cor = cor
                this.tamanho = tamanho
                this.peso = peso
            }

            dormir (){
                console.log ('dormir')
            }
        }

        // subclasse cachorro de animal
        class CachorroHeranca extends Animal {
            constructor (cor, tamanho, peso, orelhas) {
                super(cor, tamanho, peso)
                this.orelhas = orelhas
            }
            Rosnar () {
                console.log('rosna')
            }
        }

        // subclasse Pug de Cachorro Herança
        class Pug extends CachorroHeranca {
            constructor () {
                super('white', 60, 30, 'pequenas')
            }
        }

        // subclasse passaro de animal
        class PassaroHeranca extends Animal {
            constructor (cor, tamanho, peso){
                super(cor, tamanho, peso)
                this.bico = 'Grande'
            }
            voar () {
                console.log('voando')
            }
        }

        // subclasse papagaio de passaro
        class Papagaio  extends PassaroHeranca{
            constructor () {
                super('verde', 60, 25)
                this.sabeFalar = 'sim'
            }
            falar () {
                console.log('falar')
            }
        }

        let cachorroHeranca = new CachorroHeranca ()
        let passaroHeranca = new PassaroHeranca ()

        console.log(cachorroHeranca)
        console.log(passaroHeranca)

        // classe CachorroHerança herda o metodo dormir de Animal
        cachorroHeranca.dormir()

        let pug = new Pug()
        console.log(pug)
        pug.Rosnar()

        let papagaio = new Papagaio()
        console.log(papagaio)
        papagaio.falar()

    </script>
</head>
