<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo JS</title>
    <!--Babel utilizado para converter ES6 para ES5 em browser antigos-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        //contexto rest
        function soma(...param){ // -> [3,8,5,7] --- resta fa\ isso, utilizado no contexto de função
            let resultado = 0
            console.log(param)
            param.forEach(v => resultado += v)
            return resultado
        } 

        console.log(soma(3,8,5,7, -8, 0, 10, 20, 15, -80, 100))

        function multiplicador (m, ...p){
            console.log(m) //valor definido
            let resultado = 0
            console.log(p) //valor indefinido
            p.forEach(v => resultado += m*v)
            return resultado
        }

        console.log(multiplicador(5,7,10,50))
    </script>
</head>
<body>

</body>
</html>
