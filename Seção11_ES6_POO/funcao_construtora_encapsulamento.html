<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo JS</title>
    <!--Babel utilizado para converter ES6 para ES5 em browser antigos-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        // função construtora 
        let Carro = function () {
            this.cor = 'Black'
            this.modelo = 'Opala'
            this.velocidadeAtual = 0
            // atributo simples que acaba podendo ser motificado...
            this.velocidadeMaxima = 180

            this.acelerar = function() {     
                let velocidade = this.getVelocidadeAtual() + 50
                if (velocidade > this.velocidadeMaxima) {
                    velocidade = this.velocidadeMaxima
                }
                this.setVelocidadeAtual(velocidade)
            }
            this.getVelocidadeAtual = function () {
                return this.velocidadeAtual
            }
            this.setVelocidadeAtual = function (velocidadeAtual) {
                this.velocidadeAtual = velocidadeAtual
            }
        } 

        let carro = new Carro()
        console.log(carro.velocidadeAtual)
        carro.acelerar()
        carro.acelerar()
        console.log(carro.velocidadeAtual)
        carro.acelerar()
        carro.acelerar()
        console.log(carro.velocidadeAtual)
        carro.acelerar()
        carro.acelerar()
        carro.velocidadeMaxima = 230
        carro.acelerar()
        console.log(carro.velocidadeAtual)

        // ------- função construtora com encapssulamento
        let Carro2 = function () {
            // atributo privado - não pode ser modificado
            var velocidadeMaxima = 180
            var quilometrosRodados = 0

            this.cor = 'Black'
            this.modelo = 'Opala'
            this.velocidadeAtual = 0

            this.acelerar = function() {     
                let velocidade = this.getVelocidadeAtual() + 50
                if (velocidade > velocidadeMaxima) {
                    velocidade = velocidadeMaxima
                }
                this.setVelocidadeAtual(velocidade)

                //quilometros rodados
                setQuilometrosRodados(0.07)
                console.log(quilometrosRodados)
            }
            this.getVelocidadeAtual = function () {
                return this.velocidadeAtual
            }
            this.setVelocidadeAtual = function (velocidadeAtual) {
                this.velocidadeAtual = velocidadeAtual
            }

            // função quilometros rodados - privada
            var setQuilometrosRodados = function (q) {
                quilometrosRodados += q 
            }
        } 

        let carro2 = new Carro2() //atenção aos objetos
        console.log(carro2.velocidadeAtual)
        carro2.acelerar()
        carro2.acelerar()
        console.log(carro2.velocidadeAtual)
        carro2.acelerar()
        carro2.acelerar()
        console.log(carro2.velocidadeAtual)
        carro2.acelerar()
        carro2.acelerar()
        // carro2.velocidadeMaxima = 230
        carro2.acelerar()
        console.log(carro2.velocidadeAtual)

        console.log(carro)
        console.log(carro2)



    </script>
</head>
<body>

</body>
</html>
