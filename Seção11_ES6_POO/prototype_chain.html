<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo JS</title>
    <!--Babel utilizado para converter ES6 para ES5 em browser antigos-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
       //Object.prototype
        //classe master     
       let animal = {
        atributo1: 'a'
       }
        //sublclasse   
       let vertebrado = {
        __proto__:animal, atributo2: 'b'
       }
        //subclasse da subclasse    
       let ave = {
         __proto__:vertebrado, atributo3: 'c'
       }
       console.log(ave.atributo1, ave.atributo3, ave.atributo2)

    </script>
</head>
<body>

</body>
</html>
