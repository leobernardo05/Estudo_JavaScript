<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo JS</title>
    <!--Babel utilizado para converter ES6 para ES5 em browser antigos-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        let pessoa = {
            nome: 'maria',
            idade: '40'
        }
        console.log(pessoa)
        // ---------------------------- incluindo atributos
        pessoa.sexo = 'Feminino'
        console.log(pessoa)

        // ------------ incluindo functions
        pessoa.dizerOi = () => console.log('Olá, tudo bem? ')
        pessoa.dizerOi()
    </script>
</head>
<body>

</body>
</html>
